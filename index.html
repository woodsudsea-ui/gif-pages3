<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GIF Fullscreen</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-size: 0;
      line-height: 0;
    }

    .gif-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    .gif-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      border: 0;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="gif-wrap">
    <!-- 只需要把下面 src="" 里的内容替换成你的 GIF 图片地址 -->
    <img src="./top.gif" alt="">
  </div>
</body>
</html>
